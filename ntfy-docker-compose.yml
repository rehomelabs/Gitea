services:
  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    networks:
      - frontend # Update with your Traefik Docker Network
    labels:
      - traefik.enable=true
      - traefik.http.routers.ntfy.tls=true
      - traefik.http.routers.ntfy.tls.certresolver=cloudflare # enter your cert resolver you configured for Traefik
      - traefik.http.routers.ntfy.entrypoints=websecure
      - traefik.http.routers.ntfy.service=ntfy
      - traefik.http.services.ntfy.loadbalancer.server.port=80
      - traefik.http.middlewares.ntfy-compress.compress=true
      - traefik.http.routers.ntfy.rule=Host(`ntfy.local.rehomelabs.com`) # Enter your host URL
    command:
      - serve
    environment:
      - TZ= America/Chicago   # optional: set desired timezone
      - NTFY_BASE_URL=https://ntfy.lab.rehomelabs.com # Enter your host URL
    user: 1000:1000
    volumes:
      - /etc/ntfy:/etc/ntfy
      - ntfy-cache:/var/cache/ntfy
    restart: unless-stopped
    healthcheck:
        test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
        interval: 60s
        timeout: 10s
        retries: 3
        start_period: 40s
    init: true # needed, if healthcheck is used. Prevents zombie processes
volumes:
  ntfy-cache:
networks:
  frontend: # Update with your Traefik Docker Network
    external: true
