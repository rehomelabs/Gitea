services:
  gitea:
    image: docker.gitea.com/gitea:latest
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=db:5432
      - GITEA__database__NAME=${GITEA__database__NAME}
      - GITEA__database__USER=${GITEA__database__USER}
      - GITEA__database__PASSWD=${GITEA__database__PASSWD}
      - GITEA__webhook__ALLOWED_HOST_LIST=loopback,private,*.yourdomain.com # Enter your domain here
      - GITEA__server__ROOT_URL=https://gitea.local.rehomelabs.com # Enter your root URL here
      - GITEA__server__DOMAIN=gitea.local.rehomelabs.com # Enter your domain here
      - GITEA__server__SSH_DOMAIN=gitea.local.rehomelabs.com # Enter your domain here
      - GITEA__security__REVERSE_PROXY_TRUSTED_PROXIES=192.x.x.x # put the CIDR range, IP of your reverse proxy or *
      - GITEA__security__REVERSE_PROXY_LIMIT=1 # How many layers of a reverse proxy you have, typicaly its one
    restart: always
    networks:
      - default
      - frontend # put your Traefik Docker Network
    labels:
      - traefik.enable=true
      - traefik.http.routers.gitea.tls=true
      - traefik.http.routers.gitea.tls.certresolver=cloudflare # enter your cert resolver you configured for Traefik
      - traefik.http.routers.gitea.entrypoints=websecure
      - traefik.http.routers.gitea.service=gitea
      - traefik.http.services.gitea.loadbalancer.server.port=3000 
      - traefik.http.routers.gitea.rule=Host(`gitea.local.rehomelabs.com`) # Enter your host URL
    volumes:
      - ./gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - db

  db:
    image: docker.io/library/postgres:16
    restart: always
    environment:
      - POSTGRES_USER=${GITEA__database__USER}
      - POSTGRES_PASSWORD=${GITEA__database__PASSWD}
      - POSTGRES_DB=${GITEA__database__NAME}
    networks:
      - default
    volumes:
      - ./postgres:/var/lib/postgresql/data
networks:
  default:
  frontend: # Again update to your Traefik Docker Network
    external: true
